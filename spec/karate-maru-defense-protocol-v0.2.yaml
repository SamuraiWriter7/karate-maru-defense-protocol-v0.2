  fields:
    - "risk_level"
    - "type"
    - "observed_pattern"
    - "one_point"
    - "one_move"
    - "safe_next_action"
  constraints:
    - "Keep the response defensive."
    - "Do not provide actionable harmful procedures."
    - "Do not mirror hostile language."
```

